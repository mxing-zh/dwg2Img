name: Release DWG2IMG Windows EXE

on:
  push:
    tags:
      - 'dwg2img-v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g. dwg2img-v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'dwg2img-tool/requirements.txt'

      - name: Install dependencies
        run: |
          cd dwg2img-tool
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          cd dwg2img-tool
          pyinstaller --noconfirm --clean --onefile --windowed --name dwg2img app.py

      - name: Resolve release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: dwg2img-tool/dist/dwg2img.exe