name: Build DWG2IMG Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - work
    paths:
      - 'dwg2img-tool/**'
      - '.github/workflows/build-dwg2img-windows-exe.yml'

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'dwg2img-tool/requirements.txt'

      - name: Install dependencies
        run: |
          cd dwg2img-tool
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          cd dwg2img-tool
          pyinstaller --noconfirm --clean --onefile --windowed --name dwg2img app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dwg2img-exe
          path: dwg2img-tool/dist/dwg2img.exe
          if-no-files-found: error